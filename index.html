<!DOCTYPE html>
<html>
<head>
    <title>Welcome to My Site</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #00c6ff, #0072ff, #00b09b, #96c93d);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 380px;
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
            color: white;
        }

        h1 {
            text-align: center;
            margin-bottom: 5px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 400;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        input::placeholder {
            color: #555;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            background: linear-gradient(to right, #00b09b, #96c93d);
            color: white;
            transition: 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .link {
            text-align: center;
            margin-top: 15px;
            cursor: pointer;
            font-size: 14px;
        }

        .link:hover {
            text-decoration: underline;
        }

        .error {
            text-align: center;
            color: #ffdddd;
            font-size: 13px;
            margin-top: 5px;
        }

        #signupForm {
            display: none;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Welcome to My Site</h1>

    <!-- LOGIN -->
    <div id="loginForm">
        <h2>Login</h2>

        <input type="text" id="loginUsername" placeholder="Username">
        <input type="password" id="loginPassword" placeholder="Password">

        <button onclick="login()">Login</button>

        <p class="error" id="loginError"></p>

        <div class="link" onclick="showSignup()">
            Don't have an account? Sign Up
        </div>
    </div>

    <!-- SIGNUP -->
    <div id="signupForm">
        <h2>Create Account</h2>

        <input type="text" id="firstName" placeholder="First Name">
        <input type="text" id="lastName" placeholder="Last Name">
        <input type="text" id="signupUsername" placeholder="Username">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="signupPassword" placeholder="Password">
        <input type="password" id="confirmPassword" placeholder="Confirm Password">

        <button onclick="createAccount()">Create Account</button>

        <p class="error" id="signupError"></p>

        <div class="link" onclick="showLogin()">
            Already have an account? Login
        </div>
    </div>

</div>

<script>

    let savedUser = {
        username: "admin",
        password: "admin"
    };

    function login() {
        let username = document.getElementById("loginUsername").value;
        let password = document.getElementById("loginPassword").value;
        let error = document.getElementById("loginError");

        if (username === savedUser.username && password === savedUser.password) {
            alert("Login Successful!");
        } else {
            error.innerText = "Invalid username or password";
        }
    }

    function createAccount() {
        let username = document.getElementById("signupUsername").value;
        let password = document.getElementById("signupPassword").value;
        let confirmPassword = document.getElementById("confirmPassword").value;
        let error = document.getElementById("signupError");

        if (password !== confirmPassword) {
            error.innerText = "Passwords do not match!";
            return;
        }

        if (password.length < 6) {
            error.innerText = "Password must be at least 6 characters.";
            return;
        }

        savedUser.username = username;
        savedUser.password = password;

        alert("Account Created Successfully!");
        showLogin();
    }

    function showSignup() {
        document.getElementById("loginForm").style.display = "none";
        document.getElementById("signupForm").style.display = "block";
    }

    function showLogin() {
        document.getElementById("signupForm").style.display = "none";
        document.getElementById("loginForm").style.display = "block";
    }

</script>

</body>
</html>
