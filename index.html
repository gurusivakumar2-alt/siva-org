<!DOCTYPE html>
<html>
<head>
    <title>Siva.org</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #0f9b0f, #1e3c72);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            color: #1e3c72;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #0f9b0f;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0c7a0c;
        }

        .link {
            text-align: center;
            margin-top: 10px;
            cursor: pointer;
            color: #1e3c72;
        }

        .error {
            color: red;
            font-size: 14px;
            text-align: center;
        }

        #signupForm {
            display: none;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- LOGIN FORM -->
    <div id="loginForm">
        <h2>Login</h2>

        <input type="text" id="loginUsername" placeholder="Username">
        <input type="password" id="loginPassword" placeholder="Password">

        <button onclick="login()">Login</button>

        <p class="error" id="loginError"></p>

        <div class="link" onclick="showSignup()">
            Don't have account? Sign Up
        </div>
    </div>

    <!-- SIGNUP FORM -->
    <div id="signupForm">
        <h2>Create Account</h2>

        <input type="text" id="firstName" placeholder="First Name">
        <input type="text" id="lastName" placeholder="Last Name">
        <input type="text" id="signupUsername" placeholder="Username">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="signupPassword" placeholder="Password">
        <input type="password" id="confirmPassword" placeholder="Confirm Password">

        <button onclick="createAccount()">Create</button>

        <p class="error" id="signupError"></p>

        <div class="link" onclick="showLogin()">
            Already have account? Login
        </div>
    </div>

</div>

<script>

    let savedUser = {
        username: "admin",
        password: "admin"
    };

    function login() {
        let username = document.getElementById("loginUsername").value;
        let password = document.getElementById("loginPassword").value;
        let error = document.getElementById("loginError");

        if (username === savedUser.username && password === savedUser.password) {
            alert("Login Successful!");
        } else {
            error.innerText = "Invalid username or password";
        }
    }

    function createAccount() {
        let username = document.getElementById("signupUsername").value;
        let password = document.getElementById("signupPassword").value;
        let confirmPassword = document.getElementById("confirmPassword").value;
        let error = document.getElementById("signupError");

        if (password !== confirmPassword) {
            error.innerText = "Passwords do not match!";
            return;
        }

        if (password.length < 6) {
            error.innerText = "Password must be at least 6 characters.";
            return;
        }

        savedUser.username = username;
        savedUser.password = password;

        alert("Account Created Successfully!");
        showLogin();
    }

    function showSignup() {
        document.getElementById("loginForm").style.display = "none";
        document.getElementById("signupForm").style.display = "block";
    }

    function showLogin() {
        document.getElementById("signupForm").style.display = "none";
        document.getElementById("loginForm").style.display = "block";
    }

</script>

</body>
</html>
