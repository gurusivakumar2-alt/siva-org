<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siva.org.2</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f9d58, #1e88e5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .container {
            background-color: rgba(0, 0, 0, 0.35);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            width: 320px;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 20px;
            background-color: white;
            color: #1e88e5;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #0f9d58;
            color: white;
        }

        .hidden {
            display: none;
        }

        .error {
            color: #ffcccc;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container" id="loginBox">
        <h1>Login</h1>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <p class="error" id="errorMsg"></p>
    </div>

    <div class="container hidden" id="welcomeBox">
        <h1>Welcome to My Site</h1>
        <p>You are successfully logged in.</p>
        <button onclick="logout()">Logout</button>
    </div>

    <script>
        function login() {
            var user = document.getElementById("username").value;
            var pass = document.getElementById("password").value;
            var error = document.getElementById("errorMsg");

            if (user === "admin" && pass === "admin") {
                document.getElementById("loginBox").classList.add("hidden");
                document.getElementById("welcomeBox").classList.remove("hidden");
                error.textContent = "";
            } else {
                error.textContent = "Invalid username or password";
            }
        }

        function logout() {
            document.getElementById("welcomeBox").classList.add("hidden");
            document.getElementById("loginBox").classList.remove("hidden");
        }
    </script>

</body>
</html>
