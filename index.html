<!DOCTYPE html>
<html>
<head>
<title>Siva Login</title>
<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, green, blue);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}
.box{
  background:rgba(0,0,0,0.4);
  padding:30px;
  border-radius:10px;
  text-align:center;
}
input{
  padding:8px;
  margin:5px;
  width:200px;
}
button{
  padding:8px 15px;
}
</style>
</head>
<body>

<div class="box" id="login">
<h2>Login</h2>
<input id="u" placeholder="Username"><br>
<input id="p" type="password" placeholder="Password"><br>
<button onclick="go()">Login</button>
<p id="msg"></p>
</div>

<div class="box" id="home" style="display:none;">
<h2>Welcome to My Site</h2>
<button onclick="logout()">Logout</button>
</div>

<script>
function go(){
 if(document.getElementById('u').value==='admin' &&
    document.getElementById('p').value==='admin'){
    document.getElementById('login').style.display='none';
    document.getElementById('home').style.display='block';
 }else{
    document.getElementById('msg').innerText='Wrong credentials';
 }
}
function logout(){
 document.getElementById('home').style.display='none';
 document.getElementById('login').style.display='block';
}
</script>

</body>
</html>
